spring.application.name=secure-document-management
# ===============================
# DATASOURCE (MYSQL)
# ===============================

# run mysql -u root -p on cmd

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sdms_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}


# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom upload path
file.upload-dir=uploads

#swagger configuration 
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

#logger
logging.level.root=INFO
logging.level.com.sdms=DEBUG


#prometheus configuration
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true

# What is Prometheus?

# Prometheus is a tool that:

# collects metrics from your application
# stores them as time-series data
# helps you monitor performance
# 📊 What Prometheus does (simple)

# It tracks things like:

# number of API requests
# response time
# error rates
# JVM memory usage
# CPU usage
# login failures

