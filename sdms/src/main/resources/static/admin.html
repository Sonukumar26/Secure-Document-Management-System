<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
}

.navbar {
    background: #1e3a5f;
    color: white;
    padding: 12px;
    display: flex;
    justify-content: space-between;
}

.container {
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.logout {
    background: darkred;
}

th {
    background: #1e3a5f;
    color: white;
}
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px 18px;
    border-radius: 6px;
    display: none;
    z-index: 1000;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div>
<b>SDMS – Admin Portal</b>
</div>

<div>
Logged in as:
<b id="navUser">Loading...</b>
<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<div class="container">

<h3>Upload Document</h3>
<input type="file" id="file">
<button onclick="uploadDocument()">Upload</button>

<p id="uploadMsg"></p>

<hr>

<h3>All Documents</h3>

<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Version</th>
<th>Owner</th>
<th>Active</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="docs"></tbody>
</table>

<hr>

<h3>Audit Logs</h3>

<input id="searchUser" placeholder="Search by username">
<button onclick="loadAuditLogs()">Search</button>

<table border="1">
<thead>
<tr>
<th>User</th>
<th>Action</th>
<th>File</th>
<th>Time</th>
</tr>
</thead>
<tbody id="audit"></tbody>
</table>

<button onclick="prevPage()">Prev</button>
<button onclick="nextPage()">Next</button>

</div>
<div id="toast" class="toast"></div>

<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/navbar.js"></script>

</body>
</html>
