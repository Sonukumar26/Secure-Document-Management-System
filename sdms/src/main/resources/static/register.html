<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<meta charset="UTF-8">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3a5f);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.box {
    width: 380px;
    background: rgba(255,255,255,0.95);
    padding: 28px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    text-align: center;
    backdrop-filter: blur(10px);
}

h2 {
    margin-bottom: 15px;
    color: #2c3e50;
}

input, select {
    width: 95%;
    margin: 8px 0;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

input:focus, select:focus {
    border-color: #2c3e50;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0f2027;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #203a43;
    transform: scale(1.02);
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

#msg {
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}

.success { color: green; }
.error { color: red; }

a {
    display: block;
    margin-top: 12px;
    text-decoration: none;
    color: #2c3e50;
    font-size: 14px;
}

.loader {
    display: none;
    margin: 10px auto;
    border: 4px solid #eee;
    border-top: 4px solid #2c3e50;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<select id="role">
    <option value="USER">USER</option>
    <option value="ADMIN">ADMIN</option>
</select>

<button id="btn" onclick="register()">Register</button>

<div class="loader" id="loader"></div>

<p id="msg"></p>

<a href="login.html">← Back to Login</a>

</div>

<script>
function register() {

    const btn = document.getElementById("btn");
    const loader = document.getElementById("loader");
    const msg = document.getElementById("msg");

    msg.innerText = "";
    msg.className = "";

    btn.disabled = true;
    loader.style.display = "block";

    fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            role: document.getElementById("role").value
        })
    })
    .then(async res => {

        const text = await res.text(); // backend returns STRING, not JSON

        if (!res.ok) {
            throw new Error(text || "Registration failed");
        }

        return text;
    })
    .then(data => {
        msg.innerText = data || "Registered Successfully!";
        msg.classList.add("success");

        setTimeout(() => {
            window.location.href = "/login.html";
        }, 1200);
    })
    .catch(err => {
        msg.innerText = err.message;
        msg.classList.add("error");
    })
    .finally(() => {
        btn.disabled = false;
        loader.style.display = "none";
    });
}
</script>

</body>
</html>
