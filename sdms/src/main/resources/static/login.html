<!DOCTYPE html>
<html>
<head>
    <title>SDMS Login</title>

    <style>
        body {
            background: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 360px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1a252f;
        }

        #msg {
            margin-top: 10px;
            color: red;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Secure Document Management System</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <div class="footer">
        © SDMS Portal
    </div>

</div>

<script>
function login() {
    fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
   
    .then(data => {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);

        // 🔁 ROLE BASED REDIRECT
        if (data.role === "ROLE_ADMIN") {
            window.location.href = "/dashboard.html";
        } else {
            window.location.href = "/user.html";
        }
    })
    .catch(() => {
        document.getElementById("msg").innerText = "Login failed";
    });
}
</script>

</body>
</html>
